<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B1F3A"/>
      <stop offset="100%" style="stop-color:#9B2D4E"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Music2 lucide icon (centered, scaled to fit) -->
  <!-- Original lucide viewBox 24x24, scaled to ~18x18, offset 7,7 -->
  <g transform="translate(7, 7) scale(0.75)" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Music2: note stem + two beamed eighth notes -->
    <circle cx="8" cy="18" r="2"/>
    <circle cx="16" cy="16" r="2"/>
    <line x1="10" y1="18" x2="10" y2="6"/>
    <line x1="18" y1="16" x2="18" y2="4"/>
    <line x1="10" y1="6" x2="18" y2="4"/>
  </g>
</svg>
