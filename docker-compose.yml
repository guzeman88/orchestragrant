services:
  # ──────────────────────────────────────────────────────────
  # Infrastructure
  # ──────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: og_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: orchestragrant
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: orchestragrant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestragrant"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: og_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: og_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: dev@orchestragrant.com
      PGADMIN_DEFAULT_PASSWORD: localdev
    ports:
      - "5050:80"
    depends_on:
      - postgres

  # ──────────────────────────────────────────────────────────
  # Backend Services
  # ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    container_name: og_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://orchestragrant:localdev@postgres:5432/orchestragrant
      DATABASE_URL_SYNC: postgresql://orchestragrant:localdev@postgres:5432/orchestragrant
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    container_name: og_celery
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://orchestragrant:localdev@postgres:5432/orchestragrant
      DATABASE_URL_SYNC: postgresql://orchestragrant:localdev@postgres:5432/orchestragrant
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./apps/api:/app
    depends_on:
      - api
      - redis
    command: celery -A celery_app worker --loglevel=info --concurrency=4

  celery-beat:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    container_name: og_celery_beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://orchestragrant:localdev@postgres:5432/orchestragrant
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./apps/api:/app
    depends_on:
      - api
      - redis
    command: celery -A celery_app beat --loglevel=info

  ai-service:
    build:
      context: .
      dockerfile: infrastructure/docker/ai-service.Dockerfile
    container_name: og_ai
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://orchestragrant:localdev@postgres:5432/orchestragrant
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8001:8001"
    volumes:
      - ./apps/ai-service:/app
    depends_on:
      - postgres
      - redis
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload

  discovery-service:
    build:
      context: .
      dockerfile: infrastructure/docker/discovery.Dockerfile
    container_name: og_discovery
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://orchestragrant:localdev@postgres:5432/orchestragrant
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8002:8002"
    volumes:
      - ./apps/discovery-service:/app
    depends_on:
      - postgres
      - redis
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --reload

  # ──────────────────────────────────────────────────────────
  # Frontend
  # ──────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: infrastructure/docker/web.Dockerfile
      target: dev
    container_name: og_web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    command: pnpm dev

volumes:
  postgres_data:
  redis_data:
